name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to server via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.env' --exclude='static/' --exclude='nginx/ssl/'
          path: ./
          remote_path: /opt/wemall-hk/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Rebuild and restart containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/wemall-hk
            docker compose build --no-cache backend frontend
            docker compose up -d --remove-orphans
            docker compose exec -T backend pip install bcrypt==4.0.1 -i https://mirrors.tencent.com/pypi/simple/
            docker compose restart backend
            docker image prune -f
            echo "部署完成 $(date)"
