name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync backend code to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.env' --exclude='static/' --exclude='__pycache__/'
          path: backend/
          remote_path: /opt/wemall-hk/backend/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Sync frontend source to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='node_modules/' --exclude='dist/'
          path: frontend/
          remote_path: /opt/wemall-hk/frontend/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Sync nginx config
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: nginx/
          remote_path: /opt/wemall-hk/nginx/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Build and restart on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            # 安装node（如果没有）
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            cd /opt/wemall-hk/frontend
            # 在服务器上安装依赖并构建
            npm install --registry=https://registry.npmmirror.com
            npm run build
            cd /opt/wemall-hk
            # 清理 Python 缓存
            docker compose exec -T backend bash /app/reload.sh || true
            # 重启所有服务
            docker compose restart backend frontend nginx
            echo "部署完成 $(date)"
