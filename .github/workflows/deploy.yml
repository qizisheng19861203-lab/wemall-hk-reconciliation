name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend
        run: |
          cd frontend
          npm install --registry=https://registry.npmmirror.com
          npm run build

      - name: Sync backend code to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.env' --exclude='static/' --exclude='__pycache__/'
          path: backend/app/
          remote_path: /opt/wemall-hk/backend/app/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Sync frontend dist to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: frontend/dist/
          remote_path: /opt/wemall-hk/frontend/dist/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Sync nginx config
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: nginx/
          remote_path: /opt/wemall-hk/nginx/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Restart backend and nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/wemall-hk
            # 完全重启 backend 容器以重新加载代码
            docker compose stop backend
            docker compose rm -f backend
            docker compose up -d backend
            echo "等待 backend 启动..."
            sleep 10
            # 检查 backend 是否就绪
            for i in {1..10}; do
              if docker compose exec -T backend curl -f http://localhost:8000/health 2>/dev/null; then
                echo "Backend 已就绪"
                break
              fi
              echo "等待 backend 启动... ($i/10)"
              sleep 2
            done
            docker compose restart nginx
            echo "部署完成 $(date)"
