# ============================================================
# wemall 对账系统 内部 nginx（HTTP only）
# SSL 由宿主机 nginx 统一处理，不在这里做 SSL 或 redirect
# ============================================================
server {
    listen 80;
    server_name weimob.blue-medicine.com;
    client_max_body_size 20M;

    # Docker 内部 DNS，backend/frontend 容器重启时不影响 nginx
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml font/opentype
               font/truetype application/vnd.ms-fontobject;

    # PDF / ZIP 下载（超时600s，流式传输）
    location ~* \.(pdf|zip)$ {
        set $wemall_backend http://backend:8000;
        proxy_pass $wemall_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # API
    location /api/ {
        set $wemall_backend http://backend:8000;
        proxy_pass $wemall_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    location /debug/ {
        set $wemall_backend http://backend:8000;
        proxy_pass $wemall_backend;
        proxy_set_header Host $host;
    }

    location /health {
        set $wemall_backend http://backend:8000;
        proxy_pass $wemall_backend;
    }

    # 前端静态资源（含 hash，长期缓存）
    location ~* /assets/.*\.(js|css)$ {
        set $wemall_frontend http://frontend:80;
        proxy_pass $wemall_frontend;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 前端页面（不缓存，部署后立即生效）
    location / {
        set $wemall_frontend http://frontend:80;
        proxy_pass $wemall_frontend;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
