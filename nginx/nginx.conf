upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# 全局 gzip 压缩（JS 1.19MB → ~400KB，CSS 357KB → ~48KB，首次加载提速 60%+）
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
    text/plain text/css text/javascript text/xml text/x-component
    application/javascript application/json application/xml application/rss+xml
    application/atom+xml image/svg+xml font/truetype font/opentype
    application/vnd.ms-fontobject;

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name weimob.blue-medicine.com;
    return 301 https://$host$request_uri;
}

# HTTPS 主服务
server {
    listen 443 ssl;
    server_name weimob.blue-medicine.com;
    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/weimob.blue-medicine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/weimob.blue-medicine.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # PDF / ZIP 下载专用路由（超时600s，关闭缓冲让大文件直接流到客户端）
    location ~* \.(pdf|zip)$ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 普通 API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # 调试端点
    location /debug/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend;
    }

    # 前端静态资源（JS/CSS 文件名含 hash，可长期缓存，第二次打开瞬间加载）
    location ~* /assets/.*\.(js|css)$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 前端其他页面（index.html 等不缓存，保证部署后立即生效）
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
